<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>Corporate Signature</title>
</head>
<body style="margin:0;padding:0;">
<!--
  Corporate Email Signature Template
  Variables: {{DisplayName}}, {{GivenName}}, {{Surname}}, {{JobTitle}}, {{Department}},
             {{Mail}}, {{Phone}}, {{Mobile}}, {{Company}}, {{Street}}, {{City}},
             {{PostalCode}}, {{Country}}, {{Office}}, {{ManagerName}}, {{ExtAttr1-15}}
-->
<table cellpadding="0" cellspacing="0" border="0" style="font-family:'Segoe UI',Calibri,Arial,Helvetica,sans-serif;font-size:10pt;color:#333333;max-width:600px;">
  <tr>
    <td style="padding-right:15px;border-right:3px solid #E30613;vertical-align:top;">
      <!-- Replace src with your company logo URL -->
      <img src="https://via.placeholder.com/120x45/E30613/FFFFFF?text=LOGO"
           alt="Company Logo" width="120" height="45"
           style="display:block;border:0;outline:none;" />
    </td>
    <td style="padding-left:15px;vertical-align:top;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="font-size:13pt;font-weight:600;color:#1a1a1a;padding-bottom:2px;font-family:'Segoe UI Semibold','Segoe UI',Calibri,Arial,sans-serif;">
            {{DisplayName}}
          </td>
        </tr>
        <tr>
          <td style="font-size:9pt;color:#E30613;text-transform:uppercase;letter-spacing:0.5px;padding-bottom:8px;font-family:'Segoe UI','Segoe UI',Calibri,Arial,sans-serif;">
            {{JobTitle}} &middot; {{Department}}
          </td>
        </tr>
        <tr>
          <td style="font-size:9pt;color:#555555;line-height:1.7;font-family:'Segoe UI',Calibri,Arial,sans-serif;">
            <span style="color:#888888;">T</span>&nbsp; {{Phone}}<br>
            <span style="color:#888888;">M</span>&nbsp; {{Mobile}}<br>
            <span style="color:#888888;">E</span>&nbsp; <a href="/cdn-cgi/l/email-protection#98e3e3d5f9f1f4e5e5" style="color:#0078D4;text-decoration:none;">{{Mail}}</a>
          </td>
        </tr>
        <tr>
          <td style="padding-top:8px;font-size:8pt;color:#999999;border-top:1px solid #e0e0e0;">
            {{Company}} &middot; {{Street}} &middot; {{PostalCode}} {{City}}
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
<!-- Legal disclaimer (optional, uncomment if needed)
<table cellpadding="0" cellspacing="0" border="0" style="max-width:600px;margin-top:12px;">
  <tr>
    <td style="font-size:7pt;color:#bbbbbb;line-height:1.4;font-family:'Segoe UI',Calibri,Arial,sans-serif;">
      Diese E-Mail und alle Anh&auml;nge sind vertraulich und ausschlie&szlig;lich f&uuml;r den/die
      genannten Empf&auml;nger bestimmt. Sollten Sie diese E-Mail irrt&uuml;mlich erhalten haben,
      informieren Sie bitte umgehend den Absender und l&ouml;schen Sie die E-Mail.
    </td>
  </tr
